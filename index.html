<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header class="header">
    <div class="header__container">
      <a href="#" class="header__logo">
        <img src="assets/images/logo.png" alt="Game Factory" />
        <span class="header__title"> The Game Factory</span>
      </a>
      <nav class="header__nav">
        <ul>
          <li><a href="#">Games</a></li>
          <li><a href="#">Team</a></li>
          <li><a href="#">About</a></li>
        </ul>
      </nav>
      <button class="header__cta">Contact</button>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section__container">
        <h1 class="section__title">Crafting Epic<br />Gaming Experiences</h1>
        <p class="section__subtitle">We're an indie game studio passionate about creating immersive worlds, compelling narratives, and unforgettable gameplay moments that bring players together.</p>
        <img class="section__image" src="assets/images/manette.svg" alt="Manette de jeu" />
        <div class="section__btns">
          <button class="section__btn">Play Our Game</button>
          <button class="section__btn">Learn More</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__container">
    
  </footer>

</body>
</html>
